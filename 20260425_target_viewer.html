<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CRC Target Viewer</title>
<style>
  :root {
    --bg:          #eef1f4;
    --panel:       #ffffff;
    --paper:       #ffffff;
    --ink:         #1a1f2b;
    --ink-soft:    #5a6373;
    --ink-dim:     #98a0ad;
    --line:        #1f3a6b;     /* target ring color (blue) */
    --line-soft:   #4566a3;
    --tint:        #e6f0fb;     /* light tint inside 10-ring */
    --aim:         #1f3a6b;
    --shot:        #c8202a;     /* scoring shot fill */
    --shot-stroke: #6a0f15;
    --sight:       #a0a8b5;     /* sighter shot fill */
    --sight-stroke:#5a6068;
    --accent:      #2d6cdf;
    --border:      #d8dde5;
    --shadow:      0 1px 3px rgba(20,30,50,0.06), 0 2px 8px rgba(20,30,50,0.04);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  h1 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  .sub { color: var(--ink-soft); font-size: 12.5px; }
  .controls {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 14px;
  }
  .ctrl { display: flex; flex-direction: column; gap: 4px; min-width: 240px; }
  .ctrl label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--ink-soft); font-weight: 600;
  }
  .ctrl select {
    appearance: none;
    -webkit-appearance: none;
    background: #fff
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%235a6373' d='M0 0l5 6 5-6z'/></svg>")
      no-repeat right 10px center;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 32px 8px 10px;
    font: inherit;
    color: var(--ink);
    cursor: pointer;
  }
  .ctrl select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 20px;
    padding: 20px 24px 32px;
    align-items: start;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }

  .target-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center;
  }
  .target-wrap svg {
    width: 100%;
    max-width: 760px;
    height: auto;
    display: block;
  }
  .target-caption {
    margin-top: 10px;
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px 20px;
    box-shadow: var(--shadow);
  }
  .panel h2 {
    margin: 0 0 4px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .panel .who {
    font-size: 18px; font-weight: 600; margin-bottom: 2px;
  }
  .panel .meta {
    font-size: 12.5px; color: var(--ink-soft); margin-bottom: 16px;
  }
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
    margin-bottom: 16px;
  }
  .stat {
    background: #f7f9fc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat .lab {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--ink-soft); font-weight: 600;
  }
  .stat .val {
    font-size: 22px; font-weight: 600; line-height: 1.15; margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .stat .unit { font-size: 11px; color: var(--ink-soft); font-weight: 500; margin-left: 2px; }
  .stat.score .val { color: #1a1f2b; }
  .stat.x .val { color: var(--shot); }

  .shots {
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .shots h3 {
    margin: 0 0 8px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--ink-soft); font-weight: 600;
  }
  table.shot-list {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  table.shot-list th, table.shot-list td {
    padding: 4px 6px;
    text-align: right;
    border-bottom: 1px solid #eef0f3;
  }
  table.shot-list th:first-child, table.shot-list td:first-child { text-align: left; }
  table.shot-list th {
    color: var(--ink-soft); font-weight: 600; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border);
  }
  table.shot-list td.miss { color: var(--shot); font-weight: 600; }
  table.shot-list td.is-x { color: var(--shot); font-weight: 600; }
  table.shot-list tr.sighter td { color: var(--ink-dim); }

  .nodata {
    background: #f7f9fc;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
  }

  /* Target SVG styling */
  .ring         { fill: none; stroke: var(--line); stroke-width: 0.06; }
  .ring-outer   { stroke-width: 0.10; }
  .ring-10      { stroke-width: 0.08; }
  .ring-x       { stroke-width: 0.07; }
  .ten-fill     { fill: var(--tint); stroke: none; }
  .aim-square   { fill: none; stroke: var(--aim); stroke-width: 0.10; }
  .ring-label {
    fill: var(--line-soft);
    font: 600 1.4px -apple-system, "Segoe UI", Roboto, sans-serif;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .ring-label-10 { fill: var(--line); font-size: 1.2px; }
  .cross-line   { stroke: var(--line-soft); stroke-width: 0.03; stroke-dasharray: 0.3 0.3; }

  .shot-dot {
    fill: var(--shot);
    stroke: var(--shot-stroke);
    stroke-width: 0.04;
  }
  .shot-dot.sighter {
    fill: var(--sight);
    stroke: var(--sight-stroke);
    stroke-dasharray: 0.12 0.08;
  }
  .shot-label {
    fill: #1a1f2b;
    font: 600 1.3px -apple-system, "Segoe UI", Roboto, sans-serif;
    text-anchor: middle;
    dominant-baseline: middle;
    paint-order: stroke;
    stroke: #ffffff;
    stroke-width: 0.12;
    stroke-linejoin: round;
  }
  .shot-label.sighter {
    fill: var(--ink-soft);
  }

  .corner-tag {
    position: relative;
    margin-top: 12px;
    display: flex; gap: 18px; flex-wrap: wrap;
    font-size: 11px; color: var(--ink-soft);
    align-items: center;
  }
  .legend-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .legend-dot.score { background: var(--shot); border: 1px solid var(--shot-stroke); }
  .legend-dot.sight { background: var(--sight); border: 1px dashed var(--sight-stroke); }
</style>
</head>
<body>
<header>
  <h1>CRC 1000-Yard Benchrest — Target Viewer</h1>
  <div class="sub">Freedom Benchrest 2026 scoring · target face drawn to scale · 0.3″ shot holes</div>
  <div class="controls">
    <div class="ctrl">
      <label for="shooterSel">Shooter</label>
      <select id="shooterSel"></select>
    </div>
    <div class="ctrl">
      <label for="targetSel">Target</label>
      <select id="targetSel"></select>
    </div>
  </div>
</header>

<main>
  <div class="target-wrap">

      <span><span class="legend-dot sight"></span>sighter</span>
      <span id="captionTxt"></span>
    </div>
  </div>

  <aside class="panel" id="infoPanel">
    <!-- info injected by JS -->
  </aside>
</main>

  svgContent += `<circle class="ten-fill" cx="0" cy="0" r="${r10}"/>`;

  // Crosshairs (subtle, full-target span)
  svgContent += `<line class="cross-line" x1="${-rOuter-1}" y1="0" x2="${rOuter+1}" y2="0"/>`;
  svgContent += `<line class="cross-line" x1="0" y1="${-rOuter-1}" x2="0" y2="${rOuter+1}"/>`;

  // Draw each ring outward to inward so outer rings sit behind labels
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i].r;
    let cls = 'ring';
    if (i === rings.length - 1) cls += ' ring-outer';
    if (rings[i].label === '10') cls += ' ring-10';
    if (rings[i].label === 'X')  cls += ' ring-x';
    svgContent += `<circle class="${cls}" cx="0" cy="0" r="${r}"/>`;
  }

  // Aiming square — 4"x4" centered on X, slightly larger than the 3" X-ring
  // (IBS/Freedom 1000-yard targets use a 4" aiming square around the X).
  const aim = 2.0;   // half-side
  svgContent += `<rect class="aim-square" x="${-aim}" y="${-aim}" width="${aim*2}" height="${aim*2}"/>`;

  // Ring number labels — placed at the midpoint of each ring band,
  // mirrored top and bottom. Skip X and 10: their bands sit inside (X) or
  // under (10) the aiming square, where labels can't go without colliding.
  // Their location is unambiguous from position alone.
  for (let i = 0; i < rings.length; i++) {
    const lab = rings[i].label;
    if (lab === 'X' || lab === '10') continue;
    const r = rings[i].r;
    const rPrev = i === 0 ? 0 : rings[i-1].r;
    const yMid = -(rPrev + r) / 2;
    svgContent += `<text class="ring-label" x="0" y="${yMid}">${lab}</text>`;
    svgContent += `<text class="ring-label" x="0" y="${-yMid}">${lab}</text>`;
  }

  svg.innerHTML = svgContent;
  // Tuck a group on the end for shot dots so we can clear/replace it
  const shotsG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  shotsG.setAttribute('id', 'shotsLayer');
  svg.appendChild(shotsG);
}

// ── Render shots for a given target ────────────────────────────────────
const SHOT_R_IN = 0.15;   // 0.3" diameter → 0.15" radius
function renderShots(target) {
  const layer = document.getElementById('shotsLayer');
  layer.innerHTML = '';
  if (!target || !target.has_data) return;

  // Draw sighters first (so scoring shots layer on top)
  const ordered = [...target.shots].sort((a, b) => Number(a.scoring) - Number(b.scoring));
  for (const s of ordered) {
    // SVG y is down; target y is up → negate
    const cx = s.x;
    const cy = -s.y;
    const cls = s.scoring ? 'shot-dot' : 'shot-dot sighter';
    const lblCls = s.scoring ? 'shot-label' : 'shot-label sighter';
    layer.insertAdjacentHTML('beforeend',
      `<circle class="${cls}" cx="${cx}" cy="${cy}" r="${SHOT_R_IN}">
         <title>Shot ${s.n}${s.scoring ? ` (scoring #${s.sn})` : ' (sighter)'}: x=${s.x.toFixed(2)}″, y=${s.y.toFixed(2)}″ — ${s.miss ? 'MISS' : (s.isX ? 'X' : s.pts)}</title>
       </circle>`);
    // Label offset slightly up-right of the hole
    const labelText = s.scoring ? String(s.sn) : 's';
    layer.insertAdjacentHTML('beforeend',
      `<text class="${lblCls}" x="${cx + 0.55}" y="${cy - 0.55}">${labelText}</text>`);
  }
}

// ── Info panel rendering ───────────────────────────────────────────────
function renderInfo(shooter, target) {
  const el = document.getElementById('infoPanel');
  if (!shooter) { el.innerHTML = ''; return; }
  if (!target) {
    el.innerHTML = `
      <h2>Shooter</h2>
      <div class="who">${escapeHtml(shooter.name)}</div>
      <div class="meta">Bench ${shooter.bench} · ${shooter.targets.length} targets assigned</div>
      <div class="nodata">Select a target to view shots and score.</div>`;
    return;
  }

  const meta = `Bench ${shooter.bench} · ${target.cls} Target ${target.t_in_class} · TID ${target.tid}`;
  if (!target.has_data) {
    el.innerHTML = `
      <h2>Shooter</h2>
      <div class="who">${escapeHtml(shooter.name)}</div>
      <div class="meta">${meta}</div>
      <div class="nodata">No scoring data found in the shotlog for this target.</div>`;
    return;
  }

  const sc = target.scoring;
  const groupNote = target.miss_count > 0
    ? ` <span class="unit">(incl. ${target.miss_count}× ${DATA.miss_penalty_in}″ miss penalty)</span>`
    : '';
  const rowsHtml = target.shots.map(s => {
    const cls = s.scoring ? (s.miss ? 'miss' : (s.isX ? 'is-x' : '')) : 'sighter';
    const trCls = s.scoring ? '' : 'sighter';
    const ringLbl = s.miss ? 'M' : (s.isX ? 'X' : String(s.pts));
    const label = s.scoring ? `#${s.sn}` : `s${s.n}`;
    return `<tr class="${trCls}">
              <td>${label}</td>
              <td>${s.x.toFixed(2)}</td>
              <td>${s.y.toFixed(2)}</td>
              <td class="${cls}">${ringLbl}</td>
            </tr>`;
  }).join('');

  el.innerHTML = `
    <h2>Shooter</h2>
    <div class="who">${escapeHtml(shooter.name)}</div>
    <div class="meta">${meta}</div>

    <div class="score-grid">
      <div class="stat score">
        <div class="lab">Score</div>
        <div class="val">${sc.score}<span class="unit">/50</span></div>
      </div>
      <div class="stat x">
        <div class="lab">X-Count</div>
        <div class="val">${sc.x_count}</div>
      </div>
      <div class="stat">
        <div class="lab">Group Size</div>
        <div class="val">${sc.group_size.toFixed(3)}<span class="unit">″</span></div>
        ${target.miss_count > 0
          ? `<div style="font-size:10.5px;color:var(--ink-soft);margin-top:2px;">incl. ${target.miss_count}× ${DATA.miss_penalty_in}″ penalty</div>`
          : ''}
      </div>
      <div class="stat">
        <div class="lab">Closest to X</div>
        <div class="val">${sc.closest_x.toFixed(3)}<span class="unit">″</span></div>
      </div>
    </div>

    <div class="shots">
      <h3>Shots — ${target.sighter_count} sighter${target.sighter_count === 1 ? '' : 's'}, ${target.scoring_count} scoring</h3>
      <table class="shot-list">
        <thead>
          <tr><th>Shot</th><th>x (in)</th><th>y (in)</th><th>Ring</th></tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// ── Populate dropdowns + wire up events ────────────────────────────────
function populateShooters() {
  const sel = document.getElementById('shooterSel');
  // Sort by name for predictable order
  const sorted = [...DATA.shooters].sort((a, b) => a.name.localeCompare(b.name));
  sel.innerHTML = sorted.map((s, i) =>
    `<option value="${DATA.shooters.indexOf(s)}">${escapeHtml(s.name)} — Bench ${s.bench}</option>`
  ).join('');
}

function populateTargets(shooterIdx) {
  const sel = document.getElementById('targetSel');
  const sh = DATA.shooters[shooterIdx];
  if (!sh) { sel.innerHTML = ''; return; }
  sel.innerHTML = sh.targets.map((t, i) => {
    const tag = t.has_data ? '' : ' · (no data)';
    return `<option value="${i}">${escapeHtml(t.label)}${tag}</option>`;
  }).join('');
}

function update() {
  const si = +document.getElementById('shooterSel').value;
  const ti = +document.getElementById('targetSel').value;
  const sh = DATA.shooters[si];
  const tg = sh ? sh.targets[ti] : null;
  renderShots(tg);
  renderInfo(sh, tg);
  // Caption under the target
  const cap = document.getElementById('captionTxt');
  if (tg && sh) {
    cap.textContent = `${sh.name} · ${tg.label}`;
  } else {
    cap.textContent = '';
  }
}

// ── Smart defaults: pick the first shooter who has at least one target ─
//    with data, and select that target.
function setSmartDefault() {
  const shSel = document.getElementById('shooterSel');
  const tgSel = document.getElementById('targetSel');
  let chosen = -1;
  let chosenTarget = -1;
  for (let i = 0; i < DATA.shooters.length; i++) {
    const sh = DATA.shooters[i];
    const ti = sh.targets.findIndex(t => t.has_data);
    if (ti >= 0) { chosen = i; chosenTarget = ti; break; }
  }
  if (chosen < 0) { chosen = 0; chosenTarget = 0; }
  shSel.value = String(chosen);
  populateTargets(chosen);
  tgSel.value = String(chosenTarget);
}

// ── Boot ───────────────────────────────────────────────────────────────
buildTarget();
populateShooters();
setSmartDefault();
update();

document.getElementById('shooterSel').addEventListener('change', (e) => {
  populateTargets(+e.target.value);
  // Default to first target with data, else target 0
  const sh = DATA.shooters[+e.target.value];
  const ti = sh.targets.findIndex(t => t.has_data);
  document.getElementById('targetSel').value = String(ti >= 0 ? ti : 0);
  update();
});
document.getElementById('targetSel').addEventListener('change', update);
</script>
</body>
